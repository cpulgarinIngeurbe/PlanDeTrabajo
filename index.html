<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolidado de Iniciativas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Georgia', 'Garamond', serif;
            background: linear-gradient(135deg, #5a6d3a 0%, #6b7d42 100%);
            min-height: 100vh;
            padding: 30px 20px;
            margin: 0;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #E7E9C1;
            position: relative;
            padding-top: 20px;
        }

        .logo-top {
            position: absolute;
            top: 0;
            right: 0;
            width: auto;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-top img {
            max-width: 200px;
            max-height: 100px;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-transform: capitalize;
            font-style: italic;
        }

        .header p {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: #A3C610;
            letter-spacing: 2px;
            text-transform: capitalize;
            font-weight: 400;
            font-style: italic;
        }

        .decorative-line {
            width: 80px;
            height: 2px;
            background: #A3C610;
            margin: 15px auto;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .section {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border-left: 4px solid #A3C610;
            width: 100%;
            overflow: hidden;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 400;
            color: #2d3e50;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: capitalize;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: #A3C610;
            font-size: 16px;
            padding: 40px;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #c00;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 350px;
            margin: 20px 0;
            background: linear-gradient(135deg, rgba(163, 198, 16, 0.05) 0%, rgba(231, 233, 193, 0.05) 100%);
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 4px;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            font-family: 'Georgia', 'Garamond', serif;
        }

        table thead {
            background: #2d3e50;
            color: #E7E9C1;
            position: sticky;
            top: 0;
        }

        table th {
            padding: 14px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: normal;
            word-break: break-word;
            min-width: 100px;
        }

        table td {
            padding: 12px 14px;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
            font-size: 13px;
            word-break: break-word;
        }

        table tbody tr:hover {
            background: #f9f9f9;
        }

        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }

        .summary-table td {
            text-align: center;
        }

        .summary-table td:first-child {
            text-align: left;
        }

        .cursor-pointer {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cursor-pointer:hover {
            opacity: 0.7;
            background: #f0f0f0 !important;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(75, 79, 29, 0.6);
            animation: fadeIn 0.3s;
            backdrop-filter: blur(2px);
            overflow-y: auto;
            padding: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: rgba(231, 233, 193, 0.95);
            margin: 5% auto;
            padding: 30px;
            width: 100%;
            max-width: 1000px;
            max-height: 75vh;
            overflow-y: auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
            border-left: 6px solid #4B4F1D;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
            border-bottom: 2px solid #4B4F1D;
            padding-bottom: 15px;
            gap: 15px;
        }

        .modal-header h2 {
            font-family: 'Playfair Display', serif;
            color: #2d3e50;
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: capitalize;
            margin: 0;
            word-break: break-word;
            flex: 1;
            font-style: italic;
        }

        .close-btn {
            font-size: 28px;
            font-weight: 300;
            color: #A3C610;
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.3s;
            flex-shrink: 0;
            line-height: 1;
        }

        .close-btn:hover {
            color: #4B4F1D;
        }

        .detail-table {
            width: 100%;
            margin-top: 15px;
            font-size: 12px;
            border-collapse: collapse;
            font-family: 'Georgia', 'Garamond', serif;
        }

        .detail-table th {
            background: #4B4F1D;
            color: #E7E9C1;
            padding: 11px;
            text-align: left;
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            word-break: break-word;
            min-width: 90px;
        }

        .detail-table td {
            padding: 10px 11px;
            border-bottom: 1px solid #A3C610;
            color: #2d3e50;
            word-break: break-word;
            font-size: 12px;
        }

        .detail-table tbody tr {
            background: #ffffff;
        }

        .detail-table tbody tr:hover {
            background: #f0f2e8;
        }

        .id-badge {
            display: inline-block;
            background: #4B4F1D;
            color: #E7E9C1;
            padding: 4px 8px;
            border-radius: 1px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        @media (max-width: 1024px) {
            .logo-top img {
                max-width: 160px;
                max-height: 80px;
            }

            .header h1 {
                font-size: 40px;
            }

            .chart-container {
                height: 320px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 15px 10px;
            }

            .header {
                padding-top: 0;
            }

            .logo-top {
                position: static;
                justify-content: center;
                margin-bottom: 20px;
            }

            .logo-top img {
                max-width: 140px;
                max-height: 70px;
            }

            .header h1 {
                font-size: 32px;
                letter-spacing: 2px;
            }

            .header p {
                font-size: 14px;
                letter-spacing: 1px;
            }

            .section {
                padding: 20px;
            }

            .chart-container {
                height: 280px;
                padding: 20px;
            }

            table th, table td {
                padding: 8px 10px;
                font-size: 11px;
                min-width: 80px;
            }

            .detail-table th {
                padding: 8px;
                font-size: 9px;
                min-width: 70px;
            }

            .detail-table td {
                padding: 8px;
                font-size: 11px;
            }

            .modal-content {
                margin: 10% auto;
                padding: 20px;
                max-width: 95%;
            }

            .modal-header h2 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-top">
                <img src="https://raw.githubusercontent.com/cpulgarinIngeurbe/PlanDeTrabajo/main/logo.png" alt="Logo Ingeurbe" onerror="this.style.display='none'">
            </div>
            <h1>Consolidado de Iniciativas</h1>
            <div class="decorative-line"></div>
            <p>Deficiencias operativas en obra</p>
        </div>

        <div id="loading" class="loading">Cargando datos...</div>
        <div id="error" class="error" style="display:none;"></div>
        
        <div id="summarySection" style="display:none;" class="content">
            <div class="section">
                <div class="section-title">Reconteo de categorías de deficiencias</div>
                
                <div class="chart-container">
                    <div class="chart-wrapper">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 30px;">Resumen Detallado</div>
                
                <div class="table-wrapper">
                    <table class="summary-table">
                        <thead>
                            <tr>
                                <th style="width: 40%;">Categoría</th>
                                <th style="width: 20%;">Cantidad</th>
                                <th style="width: 40%;">Porcentaje</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Categoría</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="table-wrapper">
                <table class="detail-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Proyecto</th>
                            <th>Doliente</th>
                            <th>Estado</th>
                            <th>Observación</th>
                        </tr>
                    </thead>
                    <tbody id="detailTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        let chartInstance = null;
        let allData = [];
        let contenidoCol = '';
        let columnMapping = {};
        
        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function findColumn(searchTerms) {
            const allCols = Object.keys(allData[0] || {});
            for (let term of searchTerms) {
                const found = allCols.find(col => col.toLowerCase().trim() === term.toLowerCase().trim());
                if (found) return found;
            }
            return null;
        }

        function showCategoryDetails(category) {
            const details = allData.filter(row => 
                row[contenidoCol]?.toString().trim() === category
            );

            let detailHtml = '';
            let itemId = 1;
            details.forEach(row => {
                const id = `${category.substring(0, 3).toUpperCase()}-${itemId}`;
                const proyectoVal = row[columnMapping.proyecto] || '-';
                const dolienteVal = row[columnMapping.doliente] || '-';
                const estadoVal = row[columnMapping.estado] || '-';
                const observacionVal = row[columnMapping.observacion] || '-';
                
                console.log(`Fila ${itemId}:`, { proyectoVal, dolienteVal, estadoVal, observacionVal });
                
                detailHtml += `<tr id="row-${id}">
                    <td><span class="id-badge">${id}</span></td>
                    <td>${proyectoVal}</td>
                    <td>${dolienteVal}</td>
                    <td>${estadoVal}</td>
                    <td>${observacionVal}</td>
                </tr>`;
                itemId++;
            });

            document.getElementById('modalTitle').textContent = `Categoría: ${category}`;
            document.getElementById('detailTableBody').innerHTML = detailHtml;
            document.getElementById('detailModal').style.display = 'block';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
        
        async function loadExcel() {
            try {
                const url = 'https://raw.githubusercontent.com/cpulgarinIngeurbe/PlanDeTrabajo/main/Resultados080526.xlsx';
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                
                const buffer = await response.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                
                const firstSheet = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheet];
                allData = XLSX.utils.sheet_to_json(worksheet, { defval: '' });
                
                if (allData.length === 0) {
                    throw new Error('La hoja está vacía');
                }
                
                const allColumns = Object.keys(allData[0]);
                console.log('Todas las columnas del Excel:', allColumns);

                // Buscar columnas con múltiples variaciones
                contenidoCol = findColumn(['contenido', 'Contenido', 'CONTENIDO']);
                columnMapping.proyecto = findColumn(['proyecto', 'Proyecto', 'PROYECTO']);
                columnMapping.doliente = findColumn(['doliente', 'Doliente', 'DOLIENTE']);
                columnMapping.estado = findColumn(['estado', 'Estado', 'ESTADO']);
                columnMapping.observacion = findColumn(['observacion', 'observación', 'Observación', 'Observacion', 'OBSERVACION', 'OBSERVACIÓN']);

                console.log('Mapeo de columnas encontradas:', columnMapping);
                
                if (!contenidoCol) {
                    throw new Error('No se encontró columna "contenido"');
                }
                
                const categoryCount = {};
                allData.forEach(row => {
                    const category = row[contenidoCol]?.toString().trim();
                    if (category) {
                        categoryCount[category] = (categoryCount[category] || 0) + 1;
                    }
                });
                
                const totalRows = Object.values(categoryCount).reduce((a, b) => a + b, 0);
                const sortedCategories = Object.entries(categoryCount).sort((a, b) => b[1] - a[1]);
                
                const labels = sortedCategories.map(([cat]) => cat);
                const quantities = sortedCategories.map(([, count]) => count);
                const maxQuantity = Math.max(...quantities);
                const maxScale = maxQuantity + 1;
                
                setTimeout(() => {
                    const ctx = document.getElementById('categoryChart');
                    if (!ctx) return;
                    
                    if (chartInstance) {
                        chartInstance.destroy();
                    }
                    
                    chartInstance = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                data: quantities,
                                backgroundColor: [
                                    '#A3C610',
                                    '#4B4F1D',
                                    '#E7E9C1',
                                    '#2d3e50'
                                ],
                                borderColor: 'rgba(163, 198, 16, 0.3)',
                                borderWidth: 1,
                                borderRadius: 0,
                                hoverBackgroundColor: '#4B4F1D'
                            }]
                        },
                        options: {
                            indexAxis: 'x',
                            responsive: true,
                            maintainAspectRatio: false,
                            onClick: (event, elements) => {
                                if (elements.length > 0) {
                                    const index = elements[0].index;
                                    const category = labels[index];
                                    showCategoryDetails(category);
                                }
                            },
                            plugins: {
                                legend: {
                                    display: false
                                },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return 'Cantidad: ' + context.parsed.y;
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    max: maxScale,
                                    ticks: {
                                        stepSize: 1,
                                        color: '#2d3e50',
                                        font: {
                                            size: 11
                                        }
                                    },
                                    grid: {
                                        color: 'rgba(163, 198, 16, 0.1)',
                                        drawBorder: false
                                    }
                                },
                                x: {
                                    ticks: {
                                        color: '#2d3e50',
                                        font: {
                                            size: 11
                                        }
                                    },
                                    grid: {
                                        display: false,
                                        drawBorder: false
                                    }
                                }
                            }
                        },
                        plugins: [{
                            id: 'barLabels',
                            afterDatasetsDraw(chart) {
                                const {ctx} = chart;
                                chart.data.datasets.forEach((dataset, i) => {
                                    chart.getDatasetMeta(i).data.forEach((datapoint, index) => {
                                        const {x: barX, y: barY} = datapoint.tooltipPosition();
                                        ctx.fillStyle = '#2d3e50';
                                        ctx.font = 'bold 12px Georgia';
                                        ctx.textAlign = 'center';
                                        ctx.textBaseline = 'bottom';
                                        ctx.fillText(dataset.data[index], barX, barY - 6);
                                    });
                                });
                            }
                        }]
                    });
                }, 100);
                
                const summaryHtml = sortedCategories
                    .map(([category, count]) => {
                        const percentage = ((count / totalRows) * 100).toFixed(2);
                        return `<tr class="cursor-pointer" onclick="showCategoryDetails('${category}')">
                            <td>${category}</td>
                            <td><strong>${count}</strong></td>
                            <td>${percentage}%</td>
                        </tr>`;
                    })
                    .join('');
                
                document.getElementById('summaryTableBody').innerHTML = summaryHtml;
                document.getElementById('summarySection').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error: ${error.message}`;
                console.error(error);
            }
        }
        
        window.addEventListener('DOMContentLoaded', loadExcel);
    </script>
</body>
</html>
