<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Resultados - Informe Ejecutivo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Trebuchet MS, sans-serif;
            background: linear-gradient(135deg, #1a2332 0%, #2d3e50 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            color: #E7E9C1;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .header p {
            font-size: 14px;
            color: #A3C610;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .decorative-line {
            width: 80px;
            height: 2px;
            background: #A3C610;
            margin: 20px auto;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        .section {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 0;
            padding: 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border-left: 4px solid #A3C610;
        }

        .section-title {
            font-size: 24px;
            font-weight: 300;
            color: #2d3e50;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .section-subtitle {
            font-size: 12px;
            color: #A3C610;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .loading {
            text-align: center;
            color: #A3C610;
            font-size: 16px;
            padding: 40px;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 20px;
            border-radius: 0;
            margin-bottom: 20px;
            border-left: 4px solid #c00;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 450px;
            margin: 40px 0;
            background: linear-gradient(135deg, rgba(163, 198, 16, 0.05) 0%, rgba(231, 233, 193, 0.05) 100%);
            padding: 30px;
            border-radius: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, #A3C610 0%, #4B4F1D 100%);
            color: #E7E9C1;
            padding: 25px;
            border-radius: 0;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 300;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        table thead {
            background: #2d3e50;
            color: #E7E9C1;
        }

        table th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        table td {
            padding: 14px 16px;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
            font-size: 14px;
        }

        table tbody tr:hover {
            background: #f9f9f9;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        .summary-table td {
            text-align: center;
        }

        .summary-table td:first-child {
            text-align: left;
        }

        .percentage-bar {
            display: inline-block;
            height: 6px;
            background: linear-gradient(90deg, #A3C610 0%, #4B4F1D 100%);
            width: 100%;
            max-width: 200px;
            border-radius: 3px;
            margin: 0 10px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(45, 62, 80, 0.85);
            animation: fadeIn 0.3s;
            backdrop-filter: blur(3px);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: #E7E9C1;
            margin: 5% auto;
            padding: 40px;
            border-radius: 0;
            width: 90%;
            max-width: 1000px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
            border-left: 5px solid #A3C610;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #A3C610;
            padding-bottom: 20px;
        }

        .modal-header h2 {
            color: #2d3e50;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .close-btn {
            font-size: 32px;
            font-weight: 300;
            color: #A3C610;
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #4B4F1D;
        }

        .detail-table {
            width: 100%;
            margin-top: 20px;
        }

        .detail-table th {
            background: linear-gradient(135deg, #A3C610 0%, #4B4F1D 100%);
            color: #E7E9C1;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .detail-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #A3C610;
            color: #2d3e50;
        }

        .detail-table tbody tr {
            background: #ffffff;
        }

        .detail-table tbody tr:hover {
            background: #f0f2e8;
        }

        .id-badge {
            display: inline-block;
            background: linear-gradient(135deg, #4B4F1D 0%, #2d3e50 100%);
            color: #E7E9C1;
            padding: 6px 14px;
            border-radius: 2px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .cursor-pointer {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cursor-pointer:hover {
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 28px;
            }

            .section {
                padding: 30px;
            }

            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Informe Ejecutivo</h1>
            <p>Análisis de Resultados</p>
            <div class="decorative-line"></div>
        </div>

        <div id="loading" class="loading">Cargando datos...</div>
        <div id="error" class="error" style="display:none;"></div>
        
        <div id="summarySection" style="display:none;" class="content">
            <div class="section">
                <div class="section-title">Distribución de Categorías</div>
                <div class="section-subtitle">Análisis de frecuencia</div>
                
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>

                <div id="statsContainer" class="stats-grid"></div>

                <div class="section-title" style="margin-top: 50px; margin-bottom: 30px;">Resumen Detallado</div>
                
                <div class="table-wrapper">
                    <table class="summary-table">
                        <thead>
                            <tr>
                                <th>Categoría</th>
                                <th>Cantidad</th>
                                <th>Proporción</th>
                                <th>Porcentaje</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Detalles</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="table-wrapper">
                <table class="detail-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Proyecto</th>
                            <th>Tecnología</th>
                            <th>Estado</th>
                            <th>Observación</th>
                        </tr>
                    </thead>
                    <tbody id="detailTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        let chartInstance = null;
        let allData = [];
        let contenidoCol = '';
        
        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function showCategoryDetails(category) {
            const details = allData.filter(row => 
                row[contenidoCol]?.toString().trim() === category
            );

            const proyectoCol = Object.keys(allData[0]).find(col => col.toLowerCase().includes('proyecto'));
            const tecnologiaCol = Object.keys(allData[0]).find(col => col.toLowerCase().includes('tecnolog'));
            const estadoCol = Object.keys(allData[0]).find(col => col.toLowerCase().includes('estado'));
            const observacionCol = Object.keys(allData[0]).find(col => col.toLowerCase().includes('observ'));

            let detailHtml = '';
            let itemId = 1;
            details.forEach(row => {
                const id = `${category.substring(0, 3).toUpperCase()}-${itemId}`;
                detailHtml += `<tr id="row-${id}">
                    <td><span class="id-badge">${id}</span></td>
                    <td id="proyecto-${id}">${row[proyectoCol] || '-'}</td>
                    <td id="tecnologia-${id}">${row[tecnologiaCol] || '-'}</td>
                    <td id="estado-${id}">${row[estadoCol] || '-'}</td>
                    <td id="observacion-${id}">${row[observacionCol] || '-'}</td>
                </tr>`;
                itemId++;
            });

            document.getElementById('modalTitle').textContent = `${category}`;
            document.getElementById('detailTableBody').innerHTML = detailHtml;
            document.getElementById('detailModal').style.display = 'block';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
        
        async function loadExcel() {
            try {
                const url = 'https://raw.githubusercontent.com/cpulgarinIngeurbe/PlanDeTrabajo/main/Resultados080526.xlsx';
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                
                const buffer = await response.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                
                const firstSheet = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheet];
                allData = XLSX.utils.sheet_to_json(worksheet, { defval: '' });
                
                if (allData.length === 0) {
                    throw new Error('La hoja está vacía');
                }
                
                contenidoCol = Object.keys(allData[0]).find(col => 
                    col.toLowerCase().includes('contenido')
                );
                
                if (!contenidoCol) {
                    throw new Error('No se encontró columna "contenido"');
                }
                
                const categoryCount = {};
                allData.forEach(row => {
                    const category = row[contenidoCol]?.toString().trim();
                    if (category) {
                        categoryCount[category] = (categoryCount[category] || 0) + 1;
                    }
                });
                
                const totalRows = Object.values(categoryCount).reduce((a, b) => a + b, 0);
                const sortedCategories = Object.entries(categoryCount).sort((a, b) => b[1] - a[1]);
                
                const labels = sortedCategories.map(([cat]) => cat);
                const quantities = sortedCategories.map(([, count]) => count);
                
                // Stats grid
                let statsHtml = '';
                sortedCategories.slice(0, 3).forEach(([category, count]) => {
                    const percentage = ((count / totalRows) * 100).toFixed(1);
                    statsHtml += `<div class="stat-card">
                        <div class="stat-number">${count}</div>
                        <div class="stat-label">${category}</div>
                    </div>`;
                });
                document.getElementById('statsContainer').innerHTML = statsHtml;
                
                setTimeout(() => {
                    const ctx = document.getElementById('categoryChart');
                    if (!ctx) return;
                    
                    if (chartInstance) {
                        chartInstance.destroy();
                    }
                    
                    chartInstance = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Cantidad de registros',
                                data: quantities,
                                backgroundColor: [
                                    '#A3C610',
                                    '#4B4F1D',
                                    '#E7E9C1',
                                    '#2d3e50'
                                ],
                                borderColor: '#2d3e50',
                                borderWidth: 2,
                                borderRadius: 0,
                                hoverBackgroundColor: '#4B4F1D'
                            }]
                        },
                        options: {
                            indexAxis: 'x',
                            responsive: true,
                            maintainAspectRatio: false,
                            onClick: (event, elements) => {
                                if (elements.length > 0) {
                                    const index = elements[0].index;
                                    const category = labels[index];
                                    showCategoryDetails(category);
                                }
                            },
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'top',
                                    labels: {
                                        color: '#2d3e50',
                                        font: {
                                            size: 12,
                                            weight: '600'
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        stepSize: 1,
                                        color: '#2d3e50',
                                        font: {
                                            size: 12
                                        }
                                    },
                                    grid: {
                                        color: 'rgba(163, 198, 16, 0.1)',
                                        drawBorder: false
                                    }
                                },
                                x: {
                                    ticks: {
                                        color: '#2d3e50',
                                        font: {
                                            size: 12
                                        }
                                    },
                                    grid: {
                                        display: false,
                                        drawBorder: false
                                    }
                                }
                            }
                        }
                    });
                }, 100);
                
                const summaryHtml = sortedCategories
                    .map(([category, count]) => {
                        const percentage = ((count / totalRows) * 100).toFixed(2);
                        return `<tr class="cursor-pointer" onclick="showCategoryDetails('${category}')">
                            <td>${category}</td>
                            <td><strong>${count}</strong></td>
                            <td><div class="percentage-bar"></div></td>
                            <td>${percentage}%</td>
                        </tr>`;
                    })
                    .join('');
                
                document.getElementById('summaryTableBody').innerHTML = summaryHtml;
                document.getElementById('summarySection').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error: ${error.message}`;
            }
        }
        
        window.addEventListener('DOMContentLoaded', loadExcel);
    </script>
</body>
</html>
