<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Resultados</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
            padding: 20px;
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #c00;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .section-title:first-child {
            margin-top: 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table thead {
            background: #f5f5f5;
            border-bottom: 2px solid #667eea;
        }
        
        table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }
        
        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #555;
        }
        
        table tbody tr:hover {
            background: #f9f9f9;
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        .summary-table td {
            text-align: center;
        }
        
        .summary-table td:first-child {
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Visor de Resultados</h1>
            <p>Tabla desde Resultados080526.xlsx</p>
        </div>
        
        <div class="content">
            <div id="loading" class="loading">Cargando archivo...</div>
            <div id="error" class="error" style="display:none;"></div>
            
            <div id="summarySection" style="display:none;">
                <h2 class="section-title">📈 Resumen de Categorías</h2>
                <div class="table-wrapper">
                    <table class="summary-table">
                        <thead>
                            <tr>
                                <th>Categoría</th>
                                <th>Cantidad</th>
                                <th>Porcentaje</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div id="dataSection" style="display:none;">
                <h2 class="section-title">📋 Datos Completos</h2>
                <div class="table-wrapper">
                    <table id="dataTable">
                        <thead id="dataTableHead"></thead>
                        <tbody id="dataTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadExcel() {
            try {
                const url = 'https://raw.githubusercontent.com/cpulgarinIngeurbe/PlanDeTrabajo/main/Resultados080526.xlsx';
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                
                const buffer = await response.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                
                const firstSheet = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheet];
                const data = XLSX.utils.sheet_to_json(worksheet, { defval: '' });
                
                if (data.length === 0) {
                    throw new Error('La hoja está vacía');
                }
                
                // Buscar la columna "contenido" (case insensitive)
                const contenidoCol = Object.keys(data[0]).find(col => 
                    col.toLowerCase().includes('contenido')
                );
                
                if (!contenidoCol) {
                    throw new Error('No se encontró columna "contenido"');
                }
                
                // Contar categorías
                const categoryCount = {};
                data.forEach(row => {
                    const category = row[contenidoCol]?.toString().trim();
                    if (category) {
                        categoryCount[category] = (categoryCount[category] || 0) + 1;
                    }
                });
                
                const totalRows = Object.values(categoryCount).reduce((a, b) => a + b, 0);
                
                // Renderizar tabla de resumen
                const summaryHtml = Object.entries(categoryCount)
                    .sort((a, b) => b[1] - a[1])
                    .map(([category, count]) => {
                        const percentage = ((count / totalRows) * 100).toFixed(2);
                        return `<tr>
                            <td>${category}</td>
                            <td>${count}</td>
                            <td>${percentage}%</td>
                        </tr>`;
                    })
                    .join('');
                
                document.getElementById('summaryTableBody').innerHTML = summaryHtml;
                document.getElementById('summarySection').style.display = 'block';
                
                // Renderizar tabla de datos
                let dataHtml = '<thead><tr>';
                Object.keys(data[0]).forEach(key => {
                    dataHtml += `<th>${key}</th>`;
                });
                dataHtml += '</tr></thead><tbody>';
                
                data.forEach(row => {
                    dataHtml += '<tr>';
                    Object.values(row).forEach(value => {
                        dataHtml += `<td>${value}</td>`;
                    });
                    dataHtml += '</tr>';
                });
                dataHtml += '</tbody>';
                
                document.getElementById('dataTable').innerHTML = dataHtml;
                document.getElementById('dataSection').style.display = 'block';
                
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error: ${error.message}`;
                console.error(error);
            }
        }
        
        window.addEventListener('DOMContentLoaded', loadExcel);
    </script>
</body>
</html>
