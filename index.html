<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Resultados</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #A3C610 0%, #4B4F1D 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #E7E9C1;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #A3C610 0%, #4B4F1D 100%);
            color: #E7E9C1;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .loading {
            text-align: center;
            color: #4B4F1D;
            font-size: 16px;
            padding: 20px;
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #c00;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #4B4F1D;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #A3C610;
        }
        
        .section-title:first-child {
            margin-top: 0;
        }
        
        .chart-container {
            position: relative;
            width: 100%;
            height: 400px;
            margin-bottom: 40px;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #A3C610;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table thead {
            background: #A3C610;
            border-bottom: 2px solid #4B4F1D;
        }
        
        table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #E7E9C1;
        }
        
        table td {
            padding: 12px;
            border-bottom: 1px solid #A3C610;
            color: #4B4F1D;
        }
        
        table tbody tr {
            background: #ffffff;
        }

        table tbody tr:hover {
            background: #E7E9C1;
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        .summary-table td {
            text-align: center;
        }
        
        .summary-table td:first-child {
            text-align: left;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(75, 79, 29, 0.7);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: #E7E9C1;
            margin: 5% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border: 3px solid #A3C610;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 3px solid #A3C610;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: #4B4F1D;
            font-size: 24px;
        }

        .close-btn {
            font-size: 28px;
            font-weight: bold;
            color: #A3C610;
            cursor: pointer;
            background: none;
            border: none;
        }

        .close-btn:hover {
            color: #4B4F1D;
        }

        .detail-table {
            width: 100%;
            margin-top: 20px;
        }

        .detail-table th {
            background: #A3C610;
            color: #E7E9C1;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        .detail-table td {
            padding: 12px;
            border-bottom: 1px solid #A3C610;
            color: #4B4F1D;
        }

        .detail-table tbody tr {
            background: #ffffff;
        }

        .detail-table tbody tr:hover {
            background: #E7E9C1;
        }

        .id-badge {
            display: inline-block;
            background: #4B4F1D;
            color: #E7E9C1;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Visor de Resultados</h1>
            <p>Tabla desde Resultados080526.xlsx</p>
        </div>
        
        <div class="content">
            <div id="loading" class="loading">Cargando archivo...</div>
            <div id="error" class="error" style="display:none;"></div>
            
            <div id="summarySection" style="display:none;">
                <h2 class="section-title">📈 Histograma de Categorías</h2>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
                
                <h2 class="section-title">📋 Tabla de Categorías</h2>
                <div class="table-wrapper">
                    <table class="summary-table">
                        <thead>
                            <tr>
                                <th>Categoría</th>
                                <th>Cantidad</th>
                                <th>Porcentaje</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Detalles de Categoría</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="table-wrapper">
                <table class="detail-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Proyecto</th>
                            <th>Tecnología</th>
                            <th>Estado</th>
                            <th>Observación</th>
                        </tr>
                    </thead>
                    <tbody id="detailTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        let chartInstance = null;
        let allData = [];
        let contenidoCol = '';
        let rowCounter = 1;
        
        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function showCategoryDetails(category) {
            const details = allData.filter(row => 
                row[contenidoCol]?.toString().trim() === category
            );

            // Encontrar las columnas relevantes (case insensitive)
            const proyectoCol = Object.keys(allData[0]).find(col => col.toLowerCase().includes('proyecto'));
            const tecnologiaCol = Object.keys(allData[0]).find(col => col.toLowerCase().includes('tecnolog'));
            const estadoCol = Object.keys(allData[0]).find(col => col.toLowerCase().includes('estado'));
            const observacionCol = Object.keys(allData[0]).find(col => col.toLowerCase().includes('observ'));

            let detailHtml = '';
            let itemId = 1;
            details.forEach(row => {
                const id = `${category.substring(0, 3).toUpperCase()}-${itemId}`;
                detailHtml += `<tr id="row-${id}">
                    <td><span class="id-badge">${id}</span></td>
                    <td id="proyecto-${id}">${row[proyectoCol] || '-'}</td>
                    <td id="tecnologia-${id}">${row[tecnologiaCol] || '-'}</td>
                    <td id="estado-${id}">${row[estadoCol] || '-'}</td>
                    <td id="observacion-${id}">${row[observacionCol] || '-'}</td>
                </tr>`;
                itemId++;
            });

            document.getElementById('modalTitle').textContent = `Detalles de: ${category}`;
            document.getElementById('detailTableBody').innerHTML = detailHtml;
            document.getElementById('detailModal').style.display = 'block';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
        
        async function loadExcel() {
            try {
                const url = 'https://raw.githubusercontent.com/cpulgarinIngeurbe/PlanDeTrabajo/main/Resultados080526.xlsx';
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                
                const buffer = await response.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                
                const firstSheet = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheet];
                allData = XLSX.utils.sheet_to_json(worksheet, { defval: '' });
                
                if (allData.length === 0) {
                    throw new Error('La hoja está vacía');
                }
                
                contenidoCol = Object.keys(allData[0]).find(col => 
                    col.toLowerCase().includes('contenido')
                );
                
                if (!contenidoCol) {
                    throw new Error('No se encontró columna "contenido"');
                }
                
                const categoryCount = {};
                allData.forEach(row => {
                    const category = row[contenidoCol]?.toString().trim();
                    if (category) {
                        categoryCount[category] = (categoryCount[category] || 0) + 1;
                    }
                });
                
                const totalRows = Object.values(categoryCount).reduce((a, b) => a + b, 0);
                const sortedCategories = Object.entries(categoryCount).sort((a, b) => b[1] - a[1]);
                
                const labels = sortedCategories.map(([cat]) => cat);
                const quantities = sortedCategories.map(([, count]) => count);
                const colors = ['#A3C610', '#4B4F1D', '#E7E9C1'];
                
                setTimeout(() => {
                    const ctx = document.getElementById('categoryChart');
                    if (!ctx) return;
                    
                    if (chartInstance) {
                        chartInstance.destroy();
                    }
                    
                    chartInstance = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Cantidad',
                                data: quantities,
                                backgroundColor: labels.map((_, i) => colors[i % colors.length]),
                                borderColor: '#4B4F1D',
                                borderWidth: 2,
                                borderRadius: 5
                            }]
                        },
                        options: {
                            indexAxis: 'x',
                            responsive: true,
                            maintainAspectRatio: false,
                            onClick: (event, elements) => {
                                if (elements.length > 0) {
                                    const index = elements[0].index;
                                    const category = labels[index];
                                    showCategoryDetails(category);
                                }
                            },
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'top',
                                    labels: {
                                        color: '#4B4F1D'
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        stepSize: 1,
                                        color: '#4B4F1D'
                                    },
                                    grid: {
                                        color: 'rgba(163, 198, 16, 0.1)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        color: '#4B4F1D'
                                    },
                                    grid: {
                                        color: 'rgba(163, 198, 16, 0.1)'
                                    }
                                }
                            }
                        }
                    });
                }, 100);
                
                const summaryHtml = sortedCategories
                    .map(([category, count]) => {
                        const percentage = ((count / totalRows) * 100).toFixed(2);
                        return `<tr>
                            <td>${category}</td>
                            <td>${count}</td>
                            <td>${percentage}%</td>
                        </tr>`;
                    })
                    .join('');
                
                document.getElementById('summaryTableBody').innerHTML = summaryHtml;
                document.getElementById('summarySection').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error: ${error.message}`;
            }
        }
        
        window.addEventListener('DOMContentLoaded', loadExcel);
    </script>
</body>
</html>
